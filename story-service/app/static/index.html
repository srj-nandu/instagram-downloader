<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Instagram Downloader</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e0f14;
        --panel: #171922;
        --panel-soft: #202431;
        --text: #f5f7fb;
        --muted: #aab2c5;
        --line: #303546;
        --accent: #f43f5e;
        --accent-strong: #fb7185;
        --ok: #34d399;
        --danger: #fb7185;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(244, 63, 94, 0.18), transparent 30rem),
          linear-gradient(135deg, #0e0f14 0%, #121722 52%, #0f1117 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        align-items: stretch;
        margin-bottom: 24px;
      }

      .hero-copy,
      .status-panel,
      .tool-panel,
      .result-panel {
        border: 1px solid var(--line);
        background: rgba(23, 25, 34, 0.88);
        backdrop-filter: blur(12px);
        border-radius: 8px;
      }

      .hero-copy {
        padding: clamp(28px, 5vw, 56px);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent-strong);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 760px;
        margin-bottom: 16px;
        font-size: clamp(2.3rem, 7vw, 5.5rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .intro {
        max-width: 640px;
        margin-bottom: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .status-panel {
        display: grid;
        gap: 16px;
        align-content: center;
        padding: 24px;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 14px;
      }

      .status-row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .status-row span:first-child {
        color: var(--muted);
      }

      .status-row span:last-child {
        color: var(--ok);
        font-weight: 800;
      }

      .tool-panel {
        padding: 24px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 22px;
      }

      .tab {
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--muted);
        border-radius: 8px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .tab.active {
        border-color: var(--accent);
        background: rgba(244, 63, 94, 0.14);
        color: var(--text);
      }

      .form-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #10131b;
        color: var(--text);
        font: inherit;
        padding: 0 14px;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
      }

      button.primary {
        align-self: end;
        min-width: 150px;
        height: 48px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      button.primary:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      .helper {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .result-panel {
        margin-top: 24px;
        padding: 24px;
      }

      .result-panel[hidden] {
        display: none;
      }

      .message {
        margin-bottom: 16px;
        color: var(--muted);
      }

      .error {
        color: var(--danger);
        font-weight: 800;
      }

      .file-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .file-card {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #11141d;
        overflow: hidden;
      }

      .preview {
        display: grid;
        place-items: center;
        aspect-ratio: 4 / 3;
        background: #07080c;
      }

      .preview img,
      .preview video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .file-body {
        padding: 14px;
      }

      .file-body h3 {
        margin-bottom: 12px;
        font-size: 0.95rem;
        overflow-wrap: anywhere;
      }

      .file-body a {
        color: var(--accent-strong);
        font-weight: 900;
        text-decoration: none;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 24px, 1120px);
          padding: 24px 0;
        }

        .hero,
        .form-grid {
          grid-template-columns: 1fr;
        }

        button.primary {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Instagram Downloader</p>
          <h1>Get media links from Instagram posts.</h1>
          <p class="intro">
            Paste a public post, reel, or TV URL and download the media files
            directly from this deployed service.
          </p>
        </div>
        <aside class="status-panel" aria-label="Service status">
          <div class="status-row">
            <span>Service</span>
            <span>Online</span>
          </div>
          <div class="status-row">
            <span>Posts</span>
            <span>Ready</span>
          </div>
          <div class="status-row">
            <span>Stories</span>
            <span>Login required</span>
          </div>
        </aside>
      </section>

      <section class="tool-panel">
        <div class="tabs" role="tablist" aria-label="Download mode">
          <button class="tab active" type="button" data-mode="post">Post</button>
          <button class="tab" type="button" data-mode="stories">Stories</button>
        </div>

        <form id="download-form">
          <label id="url-label" for="url-input">Instagram post URL</label>
          <div class="form-grid">
            <input
              id="url-input"
              type="url"
              placeholder="https://www.instagram.com/p/SHORTCODE/"
              autocomplete="off"
              required
            />
            <button class="primary" id="submit-button" type="submit">Get Media</button>
          </div>
          <p class="helper" id="mode-helper">
            Public posts and reels can be downloaded without Instagram login.
          </p>
        </form>
      </section>

      <section class="result-panel" id="result-panel" hidden>
        <p class="message" id="message"></p>
        <div class="file-grid" id="file-grid"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#download-form");
      const input = document.querySelector("#url-input");
      const label = document.querySelector("#url-label");
      const helper = document.querySelector("#mode-helper");
      const submitButton = document.querySelector("#submit-button");
      const resultPanel = document.querySelector("#result-panel");
      const message = document.querySelector("#message");
      const fileGrid = document.querySelector("#file-grid");
      const tabs = Array.from(document.querySelectorAll(".tab"));

      let mode = "post";

      function setMode(nextMode) {
        mode = nextMode;
        tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.mode === mode));

        if (mode === "post") {
          label.textContent = "Instagram post URL";
          input.placeholder = "https://www.instagram.com/p/SHORTCODE/";
          helper.textContent = "Public posts and reels can be downloaded without Instagram login.";
        } else {
          label.textContent = "Instagram profile URL";
          input.placeholder = "https://www.instagram.com/username/";
          helper.textContent = "Stories require INSTAGRAM_USERNAME and INSTAGRAM_PASSWORD in Render.";
        }
      }

      function setMessage(text, isError = false) {
        resultPanel.hidden = false;
        message.textContent = text;
        message.classList.toggle("error", isError);
      }

      function renderFiles(files) {
        fileGrid.innerHTML = "";

        files.forEach((file) => {
          const href = file.publicPath;
          const card = document.createElement("article");
          card.className = "file-card";

          const preview = document.createElement("div");
          preview.className = "preview";

          if (file.mediaType === "video") {
            const video = document.createElement("video");
            video.src = href;
            video.controls = true;
            preview.append(video);
          } else {
            const img = document.createElement("img");
            img.src = href;
            img.alt = file.name;
            preview.append(img);
          }

          const body = document.createElement("div");
          body.className = "file-body";

          const title = document.createElement("h3");
          title.textContent = file.name;

          const link = document.createElement("a");
          link.href = href;
          link.target = "_blank";
          link.rel = "noreferrer";
          link.textContent = "Open media";

          body.append(title, link);
          card.append(preview, body);
          fileGrid.append(card);
        });
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => setMode(tab.dataset.mode));
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        submitButton.textContent = "Fetching...";
        fileGrid.innerHTML = "";
        setMessage("Starting download...");

        try {
          const endpoint = mode === "post" ? "/downloads/post" : "/downloads/stories";
          const payload = mode === "post" ? { url: input.value } : { profile_url: input.value };
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || "Download failed");
          }

          setMessage(data.message || "Download complete.");
          renderFiles(data.files || []);
        } catch (error) {
          setMessage(error.message || "Unable to complete the request.", true);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Get Media";
        }
      });
    </script>
  </body>
</html>
